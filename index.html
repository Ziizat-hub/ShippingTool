<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Tools</title>
    <link rel="stylesheet" href="shippingtool.css">
</head>
<body>
    <h1>Shipping Tools</h1>
    <div id="title">CUBIC METER CALCULSTOR</div>

    <form id="form1">
        <input id="length" type="number" placeholder="Length" required>
        <label for="length">cm</label><br><br>

         <input id="width" type="number" placeholder="width" required>
        <label for="width">cm</label><br><br>

         <input id="height" type="number" placeholder="Height" required>
        <label for="height">cm</label><br><br>

                <button type="submit">=</button>

        <input id="result" placeholder="?" disabled>
        <label for="result">cm<sup>3</sup> (Cubic Meter)</label><br><br>
    </form>

    <form id="landing-price-form" onsubmit="submitForm2(event)">
        <label for="price">Price of Goods(N)</label>
        <input type="number" id="price" step="any" placeholder="price of Goods" required>
        <br><br>

        <label for="shipping-fee">Shipping Fee ($)</label>
        <input type="number" step="any" id="shipping-fee" placeholder="Shipping Fee" required>
        <br><br>

         <label for="weight">Weigh(kg)</label>
        <input type="number" step="any" id="weight" placeholder="Weight" required>
        <br><br>

         <label for="clearing">Clearing Fee(N)</label>
        <input type="number" step="any" id="clearing-fee" placeholder="Clearing Fee" required>
        <br><br>

        <label for="exchange-fee">Exchange Rate</label>
        <input type="number" step="any" id="exchange-fee" placeholder="Exchange Rate" required>
        <br><br>

        <button type="submit" id="calculate-btn">CALCULATE</button>

    </form>

           <div id="display"></div>

    <script src="shippingtool.js"></script>
</body>
</html>
